name: CI — Build, Test & Docker

# Se dispara en cada push o PR hacia main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: ejecuta todos los tests ─────────────────────────────────────────
  test:
    name: Tests (Unit + Integration + E2E)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configura Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Testcontainers usa el Docker del runner (ubuntu-latest trae Docker instalado)
      - name: Ejecuta todos los tests
        run: mvn test

      # Guarda el reporte JaCoCo como artefacto descargable
      - name: Publica reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

  # ── Job 2: construye y publica la imagen Docker ────────────────────────────
  docker:
    name: Build & Push imagen Docker
    needs: test                        # Solo corre si los tests pasan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write                  # Permiso para publicar en GHCR

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configura Docker Buildx
        uses: docker/setup-buildx-action@v3    # Driver docker-container — requerido por cache type=gha

      # GHCR usa GITHUB_TOKEN — generado automáticamente por GitHub en cada ejecución.
      # No necesitas crear ni guardar ningún secret manualmente.
      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrae metadata (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build y push imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha       # Caché entre ejecuciones del workflow
          cache-to: type=gha,mode=max
